<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#ffffff;--bg-card:#f7f8fa;--bg-hover:#f0f1f5;--bg-active:#edf0f7;
  --text:#1a1d23;--text2:#4a4f5a;--text3:#72778a;
  --primary:#3366ff;--primary-bg:#eef2ff;--primary-light:#dbe4ff;
  --green:#00c853;--green-bg:#e6f9ee;
  --amber:#ff9800;--amber-bg:#fff4e5;
  --red:#f44336;--red-bg:#ffeaea;
  --purple:#7c4dff;--purple-bg:#f3edff;
  --border:#e5e8ed;--border-hover:#d0d5dd;
  --radius:12px;--radius-sm:8px;
  --mono:'SF Mono','Cascadia Mono','Segoe UI Mono',monospace;
  --sans:-apple-system,'Malgun Gothic','Segoe UI',sans-serif;
  --shadow:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --shadow-md:0 4px 12px rgba(0,0,0,.08);
}
html{font-size:15px}
body{
  width:480px;max-height:600px;overflow-y:auto;
  font-family:var(--sans);background:var(--bg);color:var(--text);
}
body::-webkit-scrollbar{width:4px}
body::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

/* ═══ HEADER ═══ */
.header{
  display:flex;align-items:center;gap:.7rem;
  padding:.9rem 1.1rem;border-bottom:1px solid var(--border);
  background:var(--bg);position:sticky;top:0;z-index:10;
}
.logo{
  width:34px;height:34px;border-radius:var(--radius-sm);
  flex-shrink:0;object-fit:contain;
}
.header-info{flex:1;min-width:0}
.header-info h1{font-size:1rem;font-weight:700;letter-spacing:-.01em}
.header-info .url{
  font-size:.75rem;color:var(--text3);overflow:hidden;text-overflow:ellipsis;
  white-space:nowrap;display:block;margin-top:2px;max-width:340px;
}
.header-actions{display:flex;gap:.4rem}
.icon-btn{
  width:30px;height:30px;border:1px solid var(--border);border-radius:6px;
  background:var(--bg);display:flex;align-items:center;justify-content:center;
  cursor:pointer;color:var(--text3);font-size:.85rem;transition:all .15s;
}
.icon-btn:hover{border-color:var(--primary);color:var(--primary);background:var(--primary-bg)}

.hidden{display:none!important}

/* ═══ TABS ═══ */
.tabs{
  display:flex;border-bottom:1px solid var(--border);
  padding:0 1.1rem;background:var(--bg);
}
.tab{
  flex:1;padding:.65rem .4rem;border:none;background:none;cursor:pointer;
  font-size:.82rem;font-weight:500;color:var(--text3);text-align:center;
  border-bottom:2px solid transparent;transition:all .15s;
  position:relative;white-space:nowrap;
}
.tab:hover{color:var(--text2)}
.tab.active{color:var(--primary);border-bottom-color:var(--primary);font-weight:600}
.tab .badge{
  display:inline-flex;align-items:center;justify-content:center;
  min-width:18px;height:18px;padding:0 5px;border-radius:9px;
  font-size:.73rem;font-weight:700;margin-left:.35rem;
}
.tab .badge.error{background:var(--red-bg);color:var(--red)}
.tab .badge.warn{background:var(--amber-bg);color:var(--amber)}
.tab .badge.ok{background:var(--green-bg);color:var(--green)}

/* ═══ TAB CONTENT ═══ */
.tab-content{display:none;padding:.85rem 1.1rem}
.tab-content.active{display:block}

/* ═══ STATES ═══ */
.state{
  display:none;flex-direction:column;align-items:center;justify-content:center;
  padding:3rem 1.5rem;text-align:center;gap:.75rem;
}
.state.active{display:flex}
.state-icon{font-size:2.5rem;opacity:.4}
.state p{font-size:.93rem;color:var(--text2);line-height:1.6}
.state .sub{font-size:.8rem;color:var(--text3)}
.spinner{
  width:28px;height:28px;border:3px solid var(--border);
  border-top-color:var(--primary);border-radius:50%;animation:spin .7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* ═══ CHECK ITEM ═══ */
.check-group{margin-bottom:.85rem}
.check-group-title{
  font-size:.8rem;font-weight:600;color:var(--text3);text-transform:uppercase;
  letter-spacing:.04em;padding:0 0 .45rem;margin-bottom:.45rem;
  border-bottom:1px solid var(--border);
}
.check-item{
  display:flex;align-items:flex-start;gap:.55rem;
  padding:.55rem .6rem;border-radius:var(--radius-sm);
  transition:background .15s;
}
.check-item:hover{background:var(--bg-card)}
.check-icon{
  width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;margin-top:1px;font-size:.7rem;font-weight:700;
}
.check-icon.pass{background:var(--green-bg);color:var(--green)}
.check-icon.error{background:var(--red-bg);color:var(--red)}
.check-icon.warn{background:var(--amber-bg);color:var(--amber)}
.check-icon.info{background:var(--primary-bg);color:var(--primary)}
.check-body{flex:1;min-width:0}
.check-title{font-size:.9rem;font-weight:500;color:var(--text)}
.check-desc{font-size:.8rem;color:var(--text3);margin-top:2px;line-height:1.5}
.check-type{
  display:inline-block;font-size:.7rem;font-weight:600;color:var(--primary);
  background:var(--primary-bg);border:1px solid var(--primary-light);
  padding:1px 6px;border-radius:4px;margin-right:.4rem;vertical-align:1px;
}
.check-title code,.check-desc code{
  font-family:var(--mono);font-size:.78rem;padding:1px 5px;
  background:var(--bg-active);border-radius:3px;color:var(--purple);
  font-weight:400;
}

/* ═══ EXPAND SECTION ═══ */
.expand{
  background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);
  margin-bottom:.55rem;overflow:hidden;
}
.expand-header{
  padding:.6rem .8rem;display:flex;align-items:center;justify-content:space-between;
  cursor:pointer;font-size:.9rem;font-weight:500;transition:background .15s;
}
.expand-header:hover{background:var(--bg-hover)}
.expand-header .label{display:flex;align-items:center;gap:.45rem}
.expand-chevron{
  font-size:.65rem;color:var(--text3);transition:transform .2s;
}
.expand-header.open .expand-chevron{transform:rotate(180deg)}
.expand-body{display:none;padding:.45rem .8rem .8rem;border-top:1px solid var(--border)}
.expand-body.open{display:block}

/* ═══ SCORE CARD ═══ */
.score-card{
  background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);
  padding:1.1rem;margin-bottom:.85rem;
}
.score-card-row{display:flex;align-items:center;gap:.85rem;margin-bottom:.85rem}
.score-ring{position:relative;width:64px;height:64px;flex-shrink:0}
.score-ring svg{transform:rotate(-90deg)}
.score-ring circle{fill:none;stroke-width:5;stroke-linecap:round}
.score-ring .bg{stroke:var(--border)}
.score-ring .fill{transition:stroke-dashoffset 1s ease}
.score-ring .center{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-family:var(--mono);font-size:1.2rem;font-weight:700;
}
.score-detail{flex:1}
.score-detail .grade{font-size:1rem;font-weight:700}
.score-detail .desc{font-size:.8rem;color:var(--text3);margin-top:3px}
.score-bars{display:flex;flex-direction:column;gap:.45rem}
.sbar{display:flex;align-items:center;gap:.5rem}
.sbar-label{font-size:.8rem;color:var(--text2);min-width:62px}
.sbar-track{flex:1;height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.sbar-fill{height:100%;border-radius:3px;transition:width .8s ease}
.sbar-val{font-family:var(--mono);font-size:.8rem;font-weight:600;min-width:28px;text-align:right}

/* ═══ AI BOX ═══ */
.ai-box{
  background:var(--primary-bg);border:1px solid var(--primary-light);border-radius:var(--radius);
  padding:.85rem;margin-bottom:.85rem;
}
.ai-header{display:flex;align-items:center;gap:.4rem;margin-bottom:.5rem;font-size:.87rem;font-weight:600;color:var(--primary)}
.ai-item{
  font-size:.83rem;color:var(--text2);line-height:1.55;
  padding:.35rem 0;border-bottom:1px solid rgba(51,102,255,.08);
}
.ai-item:last-child{border-bottom:none}
.ai-item strong{color:var(--text);font-weight:500}

/* ═══ JSON-LD TAB ═══ */
.type-badge{
  display:inline-block;padding:.25rem .55rem;border-radius:10px;
  font-family:var(--sans);font-size:.8rem;font-weight:500;
  margin:0 .25rem .35rem 0;
}
.type-badge.supported{background:var(--primary-bg);color:var(--primary);border:1px solid var(--primary-light)}
.type-badge.unsupported{background:var(--bg-card);color:var(--text3);border:1px solid var(--border)}
.jsonld-empty{text-align:center;padding:2rem 1rem;color:var(--text3)}
.jsonld-empty-icon{font-size:1.5rem;margin-bottom:.5rem}
.jsonld-empty-text{font-size:.85rem}
.check-item--hero{padding:.8rem .6rem}
.check-icon--lg{width:28px;height:28px;font-size:.9rem}
.type-badges{margin-bottom:.75rem}
.btn-refresh{background:none;border:none;cursor:pointer;font-size:.7rem;padding:0 2px;opacity:.6}
.btn-refresh:hover{opacity:1}
.empty-center{text-align:center}
.empty-center-title{font-size:.87rem;font-weight:500}
.empty-center-desc{font-size:.8rem;color:var(--text3);margin-top:.3rem}

/* ═══ FOOTER ═══ */
.footer{
  text-align:center;padding:.7rem 1.1rem;border-top:1px solid var(--border);
  font-size:.73rem;color:var(--text3);
}
.footer a{color:var(--primary);text-decoration:none}
.footer a:hover{text-decoration:underline}
.rules-ver{font-family:var(--mono);font-size:.67rem;color:var(--text3);opacity:.7}

/* ═══ CRAWLER STATUS ═══ */
.crawler-item{display:flex;align-items:center;gap:.5rem;padding:.45rem .6rem;border-radius:var(--radius-sm);transition:background .15s}
.crawler-item:hover{background:var(--bg-card)}
.crawler-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.crawler-dot.allowed{background:var(--green)}
.crawler-dot.blocked{background:var(--red)}
.crawler-dot.no_rule{background:var(--border)}
.crawler-name{flex:1;font-size:.87rem;font-weight:500}
.crawler-name .imp{font-size:.68rem;color:var(--text3);font-weight:400;margin-left:.3rem}
.crawler-status{font-size:.78rem;font-weight:600}
.crawler-status.allowed{color:var(--green)}
.crawler-status.blocked{color:var(--red)}
.crawler-status.no_rule{color:var(--text3)}
.crawler-summary{font-size:.85rem;color:var(--text2);text-align:center;padding:.6rem;margin-bottom:.6rem;background:var(--bg-card);border-radius:var(--radius-sm);border:1px solid var(--border)}
.crawler-tip,.section-tip{font-size:.8rem;color:var(--text3);padding:.5rem .6rem;line-height:1.5;border-top:1px solid var(--border);margin-top:.5rem}
</style>
</head>
<body>

<!-- ═══ HEADER ═══ -->
<div class="header">
  <img class="logo" src="icons/icon48.png" alt="GEO Analyzer">
  <div class="header-info">
    <h1>GEO Analyzer</h1>
    <span class="url" id="pageUrl" data-i18n="waiting"></span>
  </div>
  <div class="header-actions">
    <div class="icon-btn" id="btnCopy" data-i18n-title="copyJsonld">📋</div>
  </div>
</div>

<!-- ═══ TABS ═══ -->
<div class="tabs hidden" id="tabBar">
  <button class="tab active" data-tab="overview" data-i18n="tabOverview"></button>
  <button class="tab" data-tab="jsonld">
    JSON-LD <span class="badge ok" id="badgeJsonld">0</span>
  </button>
  <button class="tab" data-tab="geo">
    SEO · GEO <span class="badge ok" id="badgeGeo">0</span>
  </button>
  <button class="tab" data-tab="crawlers">
    <span data-i18n="tabCrawlers"></span> <span class="badge ok" id="badgeCrawlers">…</span>
  </button>

</div>

<!-- ═══ LOADING STATE ═══ -->
<div class="state active" id="stateLoading">
  <div class="spinner"></div>
  <p data-i18n="analyzing"></p>
  <span class="sub" data-i18n="analyzingSub"></span>
</div>

<!-- ═══ EMPTY STATE ═══ -->
<div class="state" id="stateEmpty">
  <div class="state-icon">🔍</div>
  <p data-i18n="noData"></p>
  <span class="sub" data-i18n="noDataSub"></span>
</div>

<!-- ═══ TAB: OVERVIEW ═══ -->
<div class="tab-content" id="tab-overview">
  <!-- Score Card -->
  <div class="score-card">
    <div class="score-card-row">
      <div class="score-ring">
        <svg viewBox="0 0 60 60">
          <circle class="bg" cx="30" cy="30" r="25" />
          <circle class="fill" id="ringFill" cx="30" cy="30" r="25"
            stroke-dasharray="157" stroke-dashoffset="157" />
        </svg>
        <div class="center" id="ringScore">0</div>
      </div>
      <div class="score-detail">
        <div class="grade" id="overviewGrade" data-i18n="analyzing"></div>
        <div class="desc" id="overviewDesc">—</div>
      </div>
    </div>
    <div class="score-bars" id="overviewBars"></div>
  </div>

  <!-- AI Recommendations -->
  <div class="ai-box" id="aiBox">
    <div class="ai-header" data-i18n="aiHeader"></div>
  </div>

  <!-- Quick Issues -->
  <div id="overviewIssues"></div>
</div>

<!-- ═══ TAB: JSON-LD ═══ -->
<div class="tab-content" id="tab-jsonld">
  <div id="jsonldChecks"></div>
</div>

<!-- ═══ TAB: GEO ═══ -->
<div class="tab-content" id="tab-geo">
  <div id="geoChecks"></div>
</div>

<!-- ═══ TAB: AI CRAWLERS ═══ -->
<div class="tab-content" id="tab-crawlers">
  <div id="crawlerChecks">
    <div class="state active" style="padding:1.5rem">
      <div class="spinner"></div>
      <p data-i18n="crawlerLoading" style="font-size:.85rem;color:var(--text3);margin-top:.5rem"></p>
    </div>
  </div>
</div>

<!-- ═══ FOOTER ═══ -->
<div class="footer">
  Google Rich Results · GEO Guidelines
  <br><span class="rules-ver" id="rulesVer"></span> <button id="btnRefreshRules" class="btn-refresh" data-i18n-title="refreshRules">🔄</button>
</div>

<script src="rules.js"></script>
<script src="analyzer.js"></script>
<script src="popup.js"></script>
</body>
</html>
