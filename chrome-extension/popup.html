<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0e17;--bg-card:#111827;--bg-surface:#1a2235;
  --text:#e8edf5;--text2:#8b97b0;--text3:#4a5568;
  --cyan:#00f0ff;--green:#00ff88;--amber:#ffb800;--red:#ff3d5a;--purple:#a78bfa;
  --border:#1e2d45;--radius:10px;
  --mono:'Segoe UI Mono','SF Mono','Cascadia Mono',monospace;
  --sans:'Segoe UI','Malgun Gothic',sans-serif;
}
html{font-size:13px}
body{
  width:420px;max-height:560px;overflow-y:auto;
  font-family:var(--sans);background:var(--bg);color:var(--text);
  padding:1rem;
}
body::-webkit-scrollbar{width:5px}
body::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* HEADER */
.header{display:flex;align-items:center;gap:.6rem;margin-bottom:1rem;padding-bottom:.75rem;border-bottom:1px solid var(--border)}
.logo{
  width:28px;height:28px;border-radius:6px;
  background:linear-gradient(135deg,var(--cyan),var(--green));
  display:flex;align-items:center;justify-content:center;
  font-size:.8rem;font-weight:700;color:var(--bg);flex-shrink:0;
}
.header h1{font-family:var(--mono);font-size:.95rem;font-weight:600}
.header .url{
  font-size:.65rem;color:var(--text3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  max-width:320px;display:block;margin-top:2px;
}

/* STATES */
.state{display:none;flex-direction:column;align-items:center;justify-content:center;padding:2rem 1rem;text-align:center;gap:.75rem}
.state.active{display:flex}
.state p{font-size:.8rem;color:var(--text2);line-height:1.5}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--cyan);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.empty-icon{font-size:2rem;opacity:.5}

/* SCORE ROW */
.score-row{
  display:flex;gap:.75rem;margin-bottom:1rem;align-items:stretch;
}
.score-main{
  background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);
  padding:1rem;display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-width:100px;
}
.score-num{font-family:var(--mono);font-size:2.2rem;font-weight:700;line-height:1}
.score-label{font-size:.6rem;color:var(--text3);margin-top:.2rem}
.score-grade{
  font-family:var(--mono);font-size:.7rem;font-weight:600;margin-top:.5rem;
  padding:.2rem .6rem;border-radius:12px;
}
.score-bars{
  flex:1;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);
  padding:.75rem;display:flex;flex-direction:column;justify-content:center;gap:.5rem;
}
.bar-item{display:flex;align-items:center;gap:.5rem}
.bar-label{font-size:.65rem;color:var(--text2);min-width:55px}
.bar-track{flex:1;height:6px;background:var(--bg-surface);border-radius:3px;overflow:hidden}
.bar-fill{height:100%;border-radius:3px;transition:width .8s ease}
.bar-val{font-family:var(--mono);font-size:.7rem;font-weight:600;min-width:28px;text-align:right}

/* TYPES */
.types{display:flex;gap:.35rem;flex-wrap:wrap;margin-bottom:.75rem}
.type-tag{
  padding:.25rem .5rem;border-radius:12px;font-family:var(--mono);font-size:.65rem;
  border:1px solid var(--cyan);color:var(--cyan);
}
.type-tag.unknown{border-color:var(--text3);color:var(--text3)}

/* SECTIONS */
.section{
  background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);
  margin-bottom:.6rem;overflow:hidden;
}
.section-header{
  padding:.6rem .75rem;display:flex;align-items:center;justify-content:space-between;
  cursor:pointer;font-size:.78rem;font-weight:500;
  transition:background .2s;
}
.section-header:hover{background:var(--bg-surface)}
.section-header .count{font-family:var(--mono);font-size:.65rem;padding:.15rem .4rem;border-radius:8px}
.section-body{display:none;padding:.5rem .75rem .75rem}
.section-body.open{display:block}
.chevron{font-size:.6rem;color:var(--text3);transition:transform .2s}
.section-header.open .chevron{transform:rotate(180deg)}

/* ISSUES */
.issue{
  display:flex;gap:.5rem;padding:.45rem 0;
  border-bottom:1px solid rgba(255,255,255,.03);
  font-size:.75rem;line-height:1.5;
}
.issue:last-child{border-bottom:none}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:5px}
.dot.error{background:var(--red)}.dot.warn{background:var(--amber)}.dot.pass{background:var(--green)}.dot.info{background:var(--cyan)}
.issue-text{color:var(--text2)}
.issue-text strong{color:var(--text);font-weight:500}
.issue-text code{
  font-family:var(--mono);font-size:.68rem;padding:.1rem .3rem;
  background:var(--bg-surface);border-radius:3px;color:var(--purple);
}

/* AI REC */
.ai-box{
  background:linear-gradient(135deg,rgba(0,240,255,.05),rgba(0,255,136,.05));
  border:1px solid rgba(0,240,255,.12);border-radius:var(--radius);
  padding:.75rem;margin-bottom:.6rem;
}
.ai-title{font-family:var(--mono);font-size:.75rem;font-weight:600;margin-bottom:.5rem;
  background:linear-gradient(135deg,var(--cyan),var(--green));-webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.ai-item{font-size:.72rem;color:var(--text2);line-height:1.5;padding:.3rem 0;border-bottom:1px solid rgba(0,240,255,.06)}
.ai-item:last-child{border-bottom:none}
.ai-item strong{color:var(--text);font-weight:500}

/* JSON VIEW */
.json-view{
  background:var(--bg-surface);border-radius:6px;padding:.75rem;
  font-family:var(--mono);font-size:.68rem;line-height:1.7;
  max-height:300px;overflow:auto;white-space:pre-wrap;word-break:break-all;
}
.jk{color:var(--cyan)}.js{color:var(--green)}.jn{color:var(--amber)}.jb{color:var(--purple)}.jl{color:var(--text3)}.jbr{color:var(--text3)}

/* ACTIONS */
.actions{display:flex;gap:.4rem;margin-bottom:.75rem}
.btn{
  flex:1;padding:.5rem;border:1px solid var(--border);border-radius:6px;
  background:transparent;color:var(--text2);cursor:pointer;font-size:.7rem;
  font-family:var(--mono);transition:all .2s;
}
.btn:hover{border-color:var(--cyan);color:var(--cyan)}
.btn.primary{background:linear-gradient(135deg,var(--cyan),var(--green));color:var(--bg);border:none;font-weight:600}
.btn.primary:hover{opacity:.9}

/* FOOTER */
.footer{text-align:center;padding:.5rem 0;font-size:.6rem;color:var(--text3);font-family:var(--mono)}
.footer a{color:var(--cyan);text-decoration:none}
</style>
</head>
<body>
  <!-- HEADER -->
  <div class="header">
    <div class="logo">{}</div>
    <div>
      <h1>JSON-LD Analyzer</h1>
      <span class="url" id="pageUrl">—</span>
    </div>
  </div>

  <!-- LOADING STATE -->
  <div class="state active" id="stateLoading">
    <div class="spinner"></div>
    <p>페이지에서 JSON-LD 추출 중...</p>
  </div>

  <!-- EMPTY STATE -->
  <div class="state" id="stateEmpty">
    <div class="empty-icon">∅</div>
    <p>이 페이지에서 JSON-LD 구조화 데이터를<br>찾을 수 없습니다.</p>
  </div>

  <!-- RESULTS -->
  <div id="results" style="display:none">
    <!-- Actions -->
    <div class="actions">
      <button class="btn" id="btnCopy" onclick="copyJsonLd()">📋 JSON-LD 복사</button>
      <button class="btn" id="btnOpen" onclick="openFullAnalyzer()">🔗 전체 분석기</button>
    </div>

    <!-- Score -->
    <div class="score-row">
      <div class="score-main">
        <div class="score-num" id="scoreNum">0</div>
        <div class="score-label">/ 100</div>
        <div class="score-grade" id="scoreGrade">—</div>
      </div>
      <div class="score-bars" id="scoreBars"></div>
    </div>

    <!-- Types -->
    <div class="types" id="typesList"></div>

    <!-- AI Recommendations -->
    <div class="ai-box" id="aiBox"></div>

    <!-- Issues -->
    <div id="issuesList"></div>

    <!-- Raw JSON -->
    <div class="section">
      <div class="section-header" onclick="toggleSection(this)">
        <span>🔍 원본 JSON-LD <span style="color:var(--text3);font-size:.65rem" id="jsonCount"></span></span>
        <span class="chevron">▼</span>
      </div>
      <div class="section-body">
        <div class="json-view" id="jsonView"></div>
      </div>
    </div>
  </div>

  <div class="footer">
    <a href="https://kyangkyongkyungkyang.github.io/jsonld-analyzer/" target="_blank">Full Version</a> · Google Rich Results Guidelines
  </div>

<script src="rules.js"></script>
<script src="analyzer.js"></script>
<script src="popup.js"></script>
</body>
</html>
