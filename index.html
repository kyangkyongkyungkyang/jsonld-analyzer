<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JSON-LD 구조화 데이터 분석기</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Noto+Sans+KR:wght@300;400;500;700;900&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg-deep:#0a0e17;--bg-card:#111827;--bg-surface:#1a2235;--bg-hover:#243049;
  --text-primary:#e8edf5;--text-secondary:#8b97b0;--text-muted:#4a5568;
  --accent-cyan:#00f0ff;--accent-green:#00ff88;--accent-amber:#ffb800;--accent-red:#ff3d5a;--accent-purple:#a78bfa;
  --border:#1e2d45;--border-active:#2d4a6f;
  --glow-cyan:0 0 20px rgba(0,240,255,.15);--glow-green:0 0 20px rgba(0,255,136,.15);
  --radius:12px;--radius-sm:8px;
  --font-mono:'JetBrains Mono',monospace;--font-sans:'Noto Sans KR','Space Grotesk',sans-serif;
  --transition:all .3s cubic-bezier(.4,0,.2,1);
}
html{font-size:15px;scroll-behavior:smooth}
body{
  font-family:var(--font-sans);background:var(--bg-deep);color:var(--text-primary);
  min-height:100vh;overflow-x:hidden;
  background-image:
    radial-gradient(ellipse 80% 50% at 50% -20%,rgba(0,240,255,.06),transparent),
    radial-gradient(ellipse 60% 40% at 80% 100%,rgba(0,255,136,.04),transparent);
}

/* GRID NOISE */
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:url("data:image/svg+xml,%3Csvg width='60' height='60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0 0h60v60H0z' fill='none'/%3E%3Cpath d='M60 0v60M0 0h60' stroke='%23ffffff' stroke-opacity='.02'/%3E%3C/svg%3E");
}

.container{max-width:1200px;margin:0 auto;padding:2rem 1.5rem;position:relative;z-index:1}

/* HEADER */
.header{text-align:center;margin-bottom:3rem;position:relative}
.header::after{
  content:'';position:absolute;bottom:-1.5rem;left:50%;transform:translateX(-50%);
  width:120px;height:1px;background:linear-gradient(90deg,transparent,var(--accent-cyan),transparent);
}
.logo{display:inline-flex;align-items:center;gap:.75rem;margin-bottom:1rem}
.logo-icon{
  width:48px;height:48px;border-radius:var(--radius-sm);
  background:linear-gradient(135deg,var(--accent-cyan),var(--accent-green));
  display:flex;align-items:center;justify-content:center;
  font-size:1.4rem;font-weight:700;color:var(--bg-deep);
  box-shadow:var(--glow-cyan);
}
.header h1{
  font-family:var(--font-mono);font-size:1.8rem;font-weight:700;letter-spacing:-.02em;
  background:linear-gradient(135deg,var(--accent-cyan),var(--accent-green));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.header p{color:var(--text-secondary);font-size:.85rem;margin-top:.5rem;font-weight:300}

/* TABS */
.tab-bar{
  display:flex;gap:.5rem;margin-bottom:1.5rem;padding:.25rem;
  background:var(--bg-card);border-radius:var(--radius);border:1px solid var(--border);
}
.tab{
  flex:1;padding:.75rem 1rem;border:none;border-radius:var(--radius-sm);
  background:transparent;color:var(--text-secondary);cursor:pointer;
  font-family:var(--font-mono);font-size:.8rem;font-weight:500;
  transition:var(--transition);
}
.tab:hover{color:var(--text-primary);background:var(--bg-surface)}
.tab.active{background:var(--bg-surface);color:var(--accent-cyan);box-shadow:inset 0 0 0 1px var(--border-active)}

/* INPUT SECTION */
.input-section{margin-bottom:2rem}
.input-group{position:relative}
.url-input{
  width:100%;padding:1rem 1.25rem;padding-right:8rem;
  background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);
  color:var(--text-primary);font-family:var(--font-mono);font-size:.85rem;
  transition:var(--transition);outline:none;
}
.url-input:focus{border-color:var(--accent-cyan);box-shadow:var(--glow-cyan)}
.url-input::placeholder{color:var(--text-muted)}

.paste-area{
  width:100%;min-height:200px;padding:1.25rem;resize:vertical;
  background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);
  color:var(--accent-green);font-family:var(--font-mono);font-size:.8rem;line-height:1.6;
  transition:var(--transition);outline:none;
}
.paste-area:focus{border-color:var(--accent-green);box-shadow:var(--glow-green)}
.paste-area::placeholder{color:var(--text-muted)}

.btn-analyze{
  position:absolute;right:.5rem;top:50%;transform:translateY(-50%);
  padding:.6rem 1.5rem;border:none;border-radius:var(--radius-sm);
  background:linear-gradient(135deg,var(--accent-cyan),var(--accent-green));
  color:var(--bg-deep);font-family:var(--font-mono);font-size:.8rem;font-weight:600;
  cursor:pointer;transition:var(--transition);
}
.btn-analyze:hover{transform:translateY(-50%) scale(1.03);box-shadow:var(--glow-cyan)}
.btn-analyze:disabled{opacity:.5;cursor:not-allowed;transform:translateY(-50%)}
.btn-analyze-paste{
  display:block;margin:1rem auto 0;
  padding:.75rem 2rem;border:none;border-radius:var(--radius-sm);
  background:linear-gradient(135deg,var(--accent-cyan),var(--accent-green));
  color:var(--bg-deep);font-family:var(--font-mono);font-size:.85rem;font-weight:600;
  cursor:pointer;transition:var(--transition);
}
.btn-analyze-paste:hover{transform:scale(1.03);box-shadow:var(--glow-cyan)}

.hidden{display:none!important}

/* LOADING */
.loading-overlay{
  display:none;flex-direction:column;align-items:center;justify-content:center;
  padding:3rem;gap:1.5rem;
}
.loading-overlay.active{display:flex}
.spinner{
  width:48px;height:48px;border:3px solid var(--border);border-top-color:var(--accent-cyan);
  border-radius:50%;animation:spin 1s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{
  font-family:var(--font-mono);font-size:.85rem;color:var(--accent-cyan);
  overflow:hidden;white-space:nowrap;
  border-right:2px solid var(--accent-cyan);
  animation:typing 2s steps(30) infinite,blink .5s step-end infinite alternate;
}
@keyframes typing{0%,100%{width:0}50%{width:22ch}}
@keyframes blink{50%{border-color:transparent}}

/* RESULTS */
.results{display:none;animation:fadeUp .5s ease}
.results.active{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

/* SCORE DASHBOARD */
.score-dashboard{
  display:grid;grid-template-columns:280px 1fr;gap:1.5rem;margin-bottom:2rem;
}
@media(max-width:768px){.score-dashboard{grid-template-columns:1fr}}

.score-gauge{
  background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);
  padding:2rem;display:flex;flex-direction:column;align-items:center;gap:1rem;
}
.gauge-ring{position:relative;width:180px;height:180px}
.gauge-ring svg{transform:rotate(-90deg)}
.gauge-ring circle{fill:none;stroke-width:8;stroke-linecap:round}
.gauge-bg{stroke:var(--border)}
.gauge-fill{transition:stroke-dashoffset 1.5s cubic-bezier(.4,0,.2,1)}
.gauge-center{
  position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
}
.gauge-score{font-family:var(--font-mono);font-size:3rem;font-weight:700;line-height:1}
.gauge-label{font-size:.75rem;color:var(--text-secondary);margin-top:.25rem}
.gauge-grade{
  font-family:var(--font-mono);font-size:.9rem;font-weight:600;
  padding:.35rem 1rem;border-radius:20px;
}

.score-breakdown{
  background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);
  padding:1.5rem;display:flex;flex-direction:column;gap:1rem;
}
.breakdown-title{font-family:var(--font-mono);font-size:.9rem;font-weight:600;color:var(--text-secondary)}
.breakdown-item{display:flex;align-items:center;gap:1rem}
.breakdown-label{font-size:.8rem;color:var(--text-secondary);min-width:120px}
.breakdown-bar-track{flex:1;height:8px;background:var(--bg-surface);border-radius:4px;overflow:hidden}
.breakdown-bar-fill{height:100%;border-radius:4px;transition:width 1s ease .3s}
.breakdown-value{font-family:var(--font-mono);font-size:.85rem;font-weight:600;min-width:45px;text-align:right}

/* DETECTED TYPES */
.detected-types{
  display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:1.5rem;
}
.type-badge{
  padding:.4rem .8rem;border-radius:20px;font-family:var(--font-mono);font-size:.75rem;font-weight:500;
  border:1px solid;
}

/* DETAIL CARDS */
.card{
  background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);
  margin-bottom:1.25rem;overflow:hidden;
}
.card-header{
  padding:1rem 1.25rem;display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid var(--border);cursor:pointer;transition:var(--transition);
}
.card-header:hover{background:var(--bg-surface)}
.card-header h3{font-family:var(--font-mono);font-size:.9rem;font-weight:600;display:flex;align-items:center;gap:.5rem}
.card-header .chevron{
  width:20px;height:20px;color:var(--text-muted);transition:transform .3s ease;
}
.card-header.open .chevron{transform:rotate(180deg)}
.card-body{padding:1.25rem;display:none}
.card-body.open{display:block;animation:fadeUp .3s ease}

/* ISSUE LIST */
.issue{
  display:flex;gap:.75rem;padding:.75rem 0;border-bottom:1px solid rgba(255,255,255,.04);
}
.issue:last-child{border-bottom:none}
.issue-icon{
  width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;font-size:.7rem;margin-top:2px;
}
.issue-icon.error{background:rgba(255,61,90,.15);color:var(--accent-red)}
.issue-icon.warn{background:rgba(255,184,0,.15);color:var(--accent-amber)}
.issue-icon.pass{background:rgba(0,255,136,.15);color:var(--accent-green)}
.issue-icon.info{background:rgba(0,240,255,.15);color:var(--accent-cyan)}
.issue-content h4{font-size:.82rem;font-weight:500;margin-bottom:.25rem}
.issue-content p{font-size:.75rem;color:var(--text-secondary);line-height:1.5}
.issue-content code{
  font-family:var(--font-mono);font-size:.72rem;padding:.15rem .4rem;
  background:var(--bg-surface);border-radius:4px;color:var(--accent-purple);
}

/* JSON TREE */
.json-tree{
  background:var(--bg-surface);border-radius:var(--radius-sm);padding:1.25rem;
  font-family:var(--font-mono);font-size:.78rem;line-height:1.8;
  max-height:500px;overflow:auto;
}
.json-tree::-webkit-scrollbar{width:6px}
.json-tree::-webkit-scrollbar-track{background:transparent}
.json-tree::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.jt-key{color:var(--accent-cyan)}
.jt-string{color:var(--accent-green)}
.jt-number{color:var(--accent-amber)}
.jt-bool{color:var(--accent-purple)}
.jt-null{color:var(--text-muted)}
.jt-bracket{color:var(--text-muted)}
.jt-missing{color:var(--accent-red);opacity:.6;font-style:italic}

/* AI RECOMMENDATIONS */
.ai-rec{
  background:linear-gradient(135deg,rgba(0,240,255,.05),rgba(0,255,136,.05));
  border:1px solid rgba(0,240,255,.15);border-radius:var(--radius);padding:1.5rem;
  margin-bottom:1.25rem;
}
.ai-rec-header{display:flex;align-items:center;gap:.5rem;margin-bottom:1rem}
.ai-rec-header span{
  font-family:var(--font-mono);font-size:.85rem;font-weight:600;
  background:linear-gradient(135deg,var(--accent-cyan),var(--accent-green));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.ai-rec-item{
  padding:.6rem 0;border-bottom:1px solid rgba(0,240,255,.08);
  font-size:.82rem;line-height:1.6;color:var(--text-secondary);
}
.ai-rec-item:last-child{border-bottom:none}
.ai-rec-item strong{color:var(--text-primary);font-weight:500}

/* SAMPLE BUTTONS */
.sample-bar{
  display:flex;gap:.5rem;flex-wrap:wrap;margin-top:.75rem;
}
.btn-sample{
  padding:.4rem .8rem;border:1px solid var(--border);border-radius:20px;
  background:transparent;color:var(--text-secondary);cursor:pointer;
  font-family:var(--font-mono);font-size:.7rem;transition:var(--transition);
}
.btn-sample:hover{border-color:var(--accent-cyan);color:var(--accent-cyan)}

/* FOOTER */
.footer{
  text-align:center;padding:2rem 0 1rem;
  font-size:.72rem;color:var(--text-muted);font-family:var(--font-mono);
}

/* ERROR */
.error-box{
  background:rgba(255,61,90,.08);border:1px solid rgba(255,61,90,.2);
  border-radius:var(--radius);padding:1.25rem;margin-bottom:1.5rem;
  color:var(--accent-red);font-size:.85rem;display:none;
}
.error-box.active{display:block}
</style>
</head>
<body>
<div class="container">
  <!-- HEADER -->
  <header class="header">
    <div class="logo">
      <div class="logo-icon">{}</div>
    </div>
    <h1>JSON-LD 구조화 데이터 분석기</h1>
    <p>Google 리치 결과 가이드라인 기반 · 실시간 검증 · AI 추천</p>
  </header>

  <!-- TABS -->
  <div class="tab-bar">
    <button class="tab active" data-tab="url" onclick="switchTab('url')">🌐 URL 입력</button>
    <button class="tab" data-tab="paste" onclick="switchTab('paste')">📋 직접 붙여넣기</button>
  </div>

  <!-- URL INPUT -->
  <div class="input-section" id="tab-url">
    <div class="input-group">
      <input type="url" class="url-input" id="urlInput" placeholder="https://example.com — 분석할 페이지 주소 입력">
      <button class="btn-analyze" id="btnAnalyzeUrl" onclick="analyzeUrl()">분석 →</button>
    </div>
    <div class="sample-bar">
      <span style="font-size:.7rem;color:var(--text-muted);padding:.4rem 0">샘플:</span>
      <button class="btn-sample" onclick="loadSample('product')">Product</button>
      <button class="btn-sample" onclick="loadSample('article')">Article</button>
      <button class="btn-sample" onclick="loadSample('faq')">FAQPage</button>
      <button class="btn-sample" onclick="loadSample('breadcrumb')">BreadcrumbList</button>
      <button class="btn-sample" onclick="loadSample('org')">Organization</button>
      <button class="btn-sample" onclick="loadSample('local')">LocalBusiness</button>
    </div>
  </div>

  <!-- PASTE INPUT -->
  <div class="input-section hidden" id="tab-paste">
    <textarea class="paste-area" id="pasteInput" placeholder='HTML 소스 또는 JSON-LD를 붙여넣으세요.&#10;&#10;예시:&#10;<script type="application/ld+json">&#10;{&#10;  "@context": "https://schema.org",&#10;  "@type": "Product",&#10;  "name": "상품명"&#10;}&#10;</script>'></textarea>
    <button class="btn-analyze-paste" onclick="analyzePaste()">분석 시작 →</button>
  </div>

  <!-- ERROR -->
  <div class="error-box" id="errorBox"></div>

  <!-- LOADING -->
  <div class="loading-overlay" id="loading">
    <div class="spinner"></div>
    <div class="loading-text">구조화 데이터 분석 중...</div>
  </div>

  <!-- RESULTS -->
  <div class="results" id="results">
    <!-- Score Dashboard -->
    <div class="score-dashboard">
      <div class="score-gauge">
        <div class="gauge-ring">
          <svg viewBox="0 0 200 200">
            <circle class="gauge-bg" cx="100" cy="100" r="85" />
            <circle class="gauge-fill" id="gaugeFill" cx="100" cy="100" r="85"
              stroke-dasharray="534" stroke-dashoffset="534" />
          </svg>
          <div class="gauge-center">
            <div class="gauge-score" id="totalScore">0</div>
            <div class="gauge-label">/ 100</div>
          </div>
        </div>
        <div class="gauge-grade" id="gradeLabel">—</div>
      </div>
      <div class="score-breakdown">
        <div class="breakdown-title">📊 세부 점수</div>
        <div id="breakdownList"></div>
      </div>
    </div>

    <!-- Detected Types -->
    <div class="detected-types" id="detectedTypes"></div>

    <!-- AI Recommendation -->
    <div class="ai-rec" id="aiRec"></div>

    <!-- Detail Cards -->
    <div id="detailCards"></div>

    <!-- Raw JSON-LD -->
    <div class="card">
      <div class="card-header" onclick="toggleCard(this)">
        <h3>🔍 원본 JSON-LD<span style="font-size:.7rem;color:var(--text-muted);margin-left:.5rem" id="jsonCount"></span></h3>
        <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>
      </div>
      <div class="card-body">
        <div class="json-tree" id="jsonTree"></div>
      </div>
    </div>
  </div>

  <footer class="footer">
    JSON-LD Analyzer · Google Structured Data Guidelines Reference · 2026
  </footer>
</div>

<script>
// ═══════════════════════════════════════
// GOOGLE RICH RESULTS SCHEMA RULES (2026)
// ═══════════════════════════════════════
const SCHEMA_RULES = {
  Product: {
    label: '상품',
    required: ['name'],
    recommended: ['image','description','sku','brand','offers','aggregateRating','review'],
    offers_required: ['price','priceCurrency','availability'],
    offers_recommended: ['url','priceValidUntil','itemCondition','seller'],
    tips: [
      '`offers`에 `availability` 속성은 Google 쇼핑 탭 노출의 핵심 조건입니다.',
      '`aggregateRating` + `review`가 함께 있으면 별점 리치 결과 노출 확률이 높아집니다.',
      '`image`는 최소 1개, 권장 3개 이상(다각도) 제공하세요.',
      '`brand.name`이 있으면 Google 머천트 센터 매칭 정확도가 올라갑니다.',
      '`gtin`, `mpn` 등 글로벌 식별자를 추가하면 제품 검색 정확도가 크게 향상됩니다.'
    ]
  },
  Article: {
    label: '기사/블로그',
    required: ['headline','author','datePublished'],
    recommended: ['image','dateModified','publisher','description','mainEntityOfPage','articleBody'],
    author_required: ['name'],
    author_recommended: ['url'],
    publisher_required: ['name','logo'],
    tips: [
      '`dateModified`는 콘텐츠 신선도 시그널로, 구글이 크롤링 우선순위에 반영합니다.',
      '`author.url`을 프로필 페이지로 연결하면 E-E-A-T 신호가 강화됩니다.',
      '`image`는 1200px 이상 너비를 권장하며, 최소 696px 이상이어야 합니다.',
      '`publisher.logo`는 60x600px 이내, 흰색/밝은 배경 권장입니다.'
    ]
  },
  FAQPage: {
    label: 'FAQ',
    required: ['mainEntity'],
    mainEntity_required: ['name','acceptedAnswer'],
    acceptedAnswer_required: ['text'],
    recommended: [],
    tips: [
      '각 질문(`name`)은 완전한 문장 형태의 질문이어야 합니다.',
      '답변(`acceptedAnswer.text`)에 HTML 마크업 사용 시 `<a>`, `<b>`, `<br>` 등만 허용됩니다.',
      'FAQ 리치 결과는 페이지당 최대 2개 질문만 SERP에 노출될 수 있습니다.',
      '2023년 이후 자동 생성 FAQ에 대한 리치 결과 노출이 제한되었습니다 — 고유한 콘텐츠가 중요합니다.'
    ]
  },
  BreadcrumbList: {
    label: '탐색경로',
    required: ['itemListElement'],
    itemListElement_required: ['position','name','item'],
    recommended: [],
    tips: [
      '`position`은 1부터 시작하는 연속 정수여야 합니다.',
      '마지막 항목(현재 페이지)은 `item`(URL) 생략이 가능합니다.',
      '모든 `item` URL은 절대 경로여야 합니다 (상대 경로 ✕).',
      '사이트 계층 구조를 정확히 반영해야 하며, 인위적 경로는 피하세요.'
    ]
  },
  Organization: {
    label: '조직',
    required: ['name','url'],
    recommended: ['logo','sameAs','contactPoint','address','description','foundingDate'],
    tips: [

// UI LOGIC

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  document.getElementById('tab-url').classList.toggle('hidden', tab !== 'url');
  document.getElementById('tab-paste').classList.toggle('hidden', tab !== 'paste');
}

function toggleCard(header) {
  header.classList.toggle('open');
  header.nextElementSibling.classList.toggle('open');
}

function loadSample(key) {
  switchTab('paste');
  document.querySelector('[data-tab="paste"]').classList.add('active');
  document.querySelector('[data-tab="url"]').classList.remove('active');
  const json = JSON.stringify(SAMPLES[key], null, 2);
  document.getElementById('pasteInput').value = `<script type="application/ld+json">\n${json}\n<\/script>`;
}

function showError(msg) {
  const box = document.getElementById('errorBox');
  box.textContent = msg;
  box.classList.add('active');
  setTimeout(() => box.classList.remove('active'), 8000);
}

function showLoading(show) {
  document.getElementById('loading').classList.toggle('active', show);
  document.getElementById('results').classList.toggle('active', false);
}

// ═══════════════════════════════════════
// FETCH & EXTRACT
// ═══════════════════════════════════════
async function analyzeUrl() {
  const url = document.getElementById('urlInput').value.trim();
  if (!url) return showError('URL을 입력하세요.');
  showLoading(true);
  document.getElementById('errorBox').classList.remove('active');

  try {
    const proxyUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`;
    const resp = await fetch(proxyUrl);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const html = await resp.text();
    const jsonlds = extractJsonLd(html);
    if (jsonlds.length === 0) throw new Error('JSON-LD 구조화 데이터를 찾을 수 없습니다.');
    runAnalysis(jsonlds);
  } catch (e) {
    showLoading(false);
    showError(`페이지 로딩 실패: ${e.message}. 직접 붙여넣기 탭을 사용해보세요.`);
  }
}

function analyzePaste() {
  const raw = document.getElementById('pasteInput').value.trim();
  if (!raw) return showError('HTML 소스 또는 JSON-LD를 붙여넣으세요.');
  document.getElementById('errorBox').classList.remove('active');

  let jsonlds;
  try {
    // Try direct JSON parse first
    const parsed = JSON.parse(raw);
    jsonlds = Array.isArray(parsed) ? parsed : [parsed];
  } catch {
    // Try extracting from HTML
    jsonlds = extractJsonLd(raw);
  }

  if (jsonlds.length === 0) return showError('유효한 JSON-LD를 찾을 수 없습니다.');
  runAnalysis(jsonlds);
}

function extractJsonLd(html) {
  const results = [];
  const regex = /<script[^>]*type\s*=\s*["']application\/ld\+json["'][^>]*>([\s\S]*?)<\/script>/gi;
  let match;
  while ((match = regex.exec(html)) !== null) {
    try {
      const parsed = JSON.parse(match[1].trim());
      if (Array.isArray(parsed)) results.push(...parsed);
      else if (parsed['@graph']) results.push(...parsed['@graph']);
      else results.push(parsed);
    } catch {}
  }
  return results;
}

// ═══════════════════════════════════════
// ANALYSIS ENGINE
// ═══════════════════════════════════════
function runAnalysis(jsonlds) {
  showLoading(false);
  const results = document.getElementById('results');
  results.classList.add('active');

  const allIssues = [];
  const typeResults = [];

  jsonlds.forEach((ld, idx) => {
    const type = getType(ld);
    const rules = SCHEMA_RULES[type];

    if (!rules) {
      typeResults.push({ type, label: type, supported: false });
      allIssues.push({ severity: 'info', title: `"${type}" — 전용 검증 규칙 없음`, desc: 'Google 리치 결과 지원 타입이 아니거나 아직 분석기에 등록되지 않은 타입입니다.', category: '타입 검증' });
      return;
    }

    typeResults.push({ type, label: rules.label, supported: true });
    const issues = validateSchema(ld, type, rules, idx);
    allIssues.push(...issues);
  });

  const scores = calculateScores(allIssues, jsonlds);
  renderResults(scores, typeResults, allIssues, jsonlds);
}

function getType(ld) {
  let t = ld['@type'];
  if (Array.isArray(t)) t = t[0];
  return t || 'Unknown';
}

function validateSchema(ld, type, rules, idx) {
  const issues = [];
  const prefix = idx > 0 ? `[${idx + 1}] ` : '';

  // Check required fields
  (rules.required || []).forEach(field => {
    if (!hasField(ld, field)) {
      issues.push({ severity: 'error', title: `${prefix}필수 속성 누락: \`${field}\``, desc: `${rules.label} 타입에서 \`${field}\`은(는) Google 리치 결과 표시에 필수입니다.`, category: '필수 속성' });
    }
  });

  // Check recommended fields
  (rules.recommended || []).forEach(field => {
    if (!hasField(ld, field)) {
      issues.push({ severity: 'warn', title: `${prefix}권장 속성 누락: \`${field}\``, desc: `\`${field}\`을(를) 추가하면 리치 결과 표시가 더 풍부해집니다.`, category: '권장 속성' });
    }
  });

  // Check nested objects (offers, author, publisher, address, etc.)
  const nestedChecks = ['offers','author','publisher','address','mainEntity','itemListElement','acceptedAnswer'];
  nestedChecks.forEach(nested => {
    const reqKey = `${nested}_required`;
    const recKey = `${nested}_recommended`;
    if (rules[reqKey] && hasField(ld, nested)) {
      const obj = ld[nested];
      const items = Array.isArray(obj) ? obj : [obj];
      items.forEach((item, i) => {
        const iPrefix = items.length > 1 ? `${nested}[${i}].` : `${nested}.`;
        (rules[reqKey] || []).forEach(f => {
          if (!hasField(item, f)) {
            issues.push({ severity: 'error', title: `${prefix}중첩 필수 속성 누락: \`${iPrefix}${f}\``, desc: `\`${nested}\` 내부의 \`${f}\`은(는) 필수입니다.`, category: '필수 속성' });
          }
        });
      });
    }
  });

  // Check @context
  if (!ld['@context'] || !String(ld['@context']).includes('schema.org')) {
    issues.push({ severity: 'error', title: `${prefix}\`@context\` 누락 또는 잘못됨`, desc: '`@context`는 "https://schema.org"이어야 합니다.', category: '구조 검증' });
  }

  // Check for common mistakes
  if (ld.image && typeof ld.image === 'string' && !ld.image.startsWith('http')) {
    issues.push({ severity: 'warn', title: `${prefix}이미지 URL이 상대 경로`, desc: '`image`는 절대 URL(https://...)이어야 합니다.', category: '데이터 품질' });
  }

  if (ld.datePublished && !/^\d{4}-\d{2}-\d{2}/.test(ld.datePublished)) {
    issues.push({ severity: 'warn', title: `${prefix}날짜 형식 확인 필요`, desc: '`datePublished`는 ISO 8601 형식(YYYY-MM-DD)을 권장합니다.', category: '데이터 품질' });
  }

  // Pass items
  (rules.required || []).forEach(field => {
    if (hasField(ld, field)) {
      issues.push({ severity: 'pass', title: `${prefix}✓ \`${field}\` 존재`, desc: '', category: '통과 항목' });
    }
  });

  return issues;
}

function hasField(obj, field) {
  if (!obj) return false;
  if (obj[field] !== undefined && obj[field] !== null && obj[field] !== '') return true;
  return false;
}

function calculateScores(issues, jsonlds) {
  const errors = issues.filter(i => i.severity === 'error').length;
  const warns = issues.filter(i => i.severity === 'warn').length;
  const passes = issues.filter(i => i.severity === 'pass').length;
  const total = errors + warns + passes;

  const requiredScore = total > 0 ? Math.max(0, Math.round(100 - (errors / total) * 150)) : 0;
  const recommendedScore = total > 0 ? Math.max(0, Math.round(100 - (warns / total) * 100)) : 0;
  const hasMultipleTypes = jsonlds.length > 1;
  const coverageScore = Math.min(100, jsonlds.length * 25 + (hasMultipleTypes ? 20 : 0));
  const qualityBonus = errors === 0 ? 15 : 0;

  const overall = Math.min(100, Math.round(requiredScore * 0.45 + recommendedScore * 0.3 + coverageScore * 0.15 + qualityBonus));

  return {
    overall, requiredScore, recommendedScore, coverageScore,
    errors, warns, passes,
    breakdown: [
      { label: '필수 속성', score: requiredScore, color: requiredScore >= 80 ? 'var(--accent-green)' : requiredScore >= 50 ? 'var(--accent-amber)' : 'var(--accent-red)' },
      { label: '권장 속성', score: recommendedScore, color: recommendedScore >= 80 ? 'var(--accent-green)' : recommendedScore >= 50 ? 'var(--accent-amber)' : 'var(--accent-red)' },
      { label: '커버리지', score: coverageScore, color: coverageScore >= 80 ? 'var(--accent-green)' : coverageScore >= 50 ? 'var(--accent-amber)' : 'var(--accent-red)' },
      { label: '데이터 품질', score: Math.max(0, 100 - errors * 20 - warns * 5), color: errors === 0 ? 'var(--accent-green)' : 'var(--accent-amber)' }
    ]
  };
}

// ═══════════════════════════════════════
// RENDER
// ═══════════════════════════════════════
function renderResults(scores, typeResults, issues, jsonlds) {
  // Score gauge
  const circumference = 2 * Math.PI * 85;
  const offset = circumference - (scores.overall / 100) * circumference;
  const fill = document.getElementById('gaugeFill');
  const scoreColor = scores.overall >= 80 ? 'var(--accent-green)' : scores.overall >= 50 ? 'var(--accent-amber)' : 'var(--accent-red)';
  fill.style.stroke = scoreColor;
  fill.style.strokeDashoffset = circumference;
  requestAnimationFrame(() => { fill.style.strokeDashoffset = offset; });

  const scoreEl = document.getElementById('totalScore');
  animateNumber(scoreEl, scores.overall);
  scoreEl.style.color = scoreColor;

  const gradeLabel = document.getElementById('gradeLabel');
  const grade = scores.overall >= 90 ? 'A+' : scores.overall >= 80 ? 'A' : scores.overall >= 70 ? 'B+' : scores.overall >= 60 ? 'B' : scores.overall >= 50 ? 'C' : scores.overall >= 30 ? 'D' : 'F';
  const gradeText = { 'A+': '우수 — 리치 결과 최적화', A: '양호 — 소폭 개선 필요', 'B+': '보통 — 권장 속성 보완', B: '미흡 — 개선 권장', C: '부족 — 필수 속성 보완 필요', D: '매우 부족', F: '심각 — 대폭 수정 필요' };
  gradeLabel.textContent = `${grade} · ${gradeText[grade]}`;
  gradeLabel.style.background = scoreColor.replace(')', ',.15)').replace('var(', 'rgba(').replace('--accent-green', '0,255,136').replace('--accent-amber', '255,184,0').replace('--accent-red', '255,61,90');
  gradeLabel.style.color = scoreColor;

  // Breakdown bars
  const breakdownList = document.getElementById('breakdownList');
  breakdownList.innerHTML = scores.breakdown.map(b => `
    <div class="breakdown-item">
      <span class="breakdown-label">${b.label}</span>
      <div class="breakdown-bar-track"><div class="breakdown-bar-fill" style="width:${b.score}%;background:${b.color}"></div></div>
      <span class="breakdown-value" style="color:${b.color}">${b.score}</span>
    </div>
  `).join('');

  // Detected types
  const dtEl = document.getElementById('detectedTypes');
  dtEl.innerHTML = typeResults.map(t => {
    const color = t.supported ? 'var(--accent-cyan)' : 'var(--text-muted)';
    return `<span class="type-badge" style="border-color:${color};color:${color}">${t.type}${t.label !== t.type ? ` · ${t.label}` : ''}${t.supported ? '' : ' (미지원)'}</span>`;
  }).join('');

  // AI Recommendations
  renderAiRecommendations(jsonlds, issues, scores);

  // Detail cards
  renderDetailCards(issues);

  // JSON tree
  document.getElementById('jsonCount').textContent = `${jsonlds.length}개 감지`;
  document.getElementById('jsonTree').innerHTML = jsonlds.map(ld => syntaxHighlight(JSON.stringify(ld, null, 2))).join('\n\n');
}

function renderAiRecommendations(jsonlds, issues, scores) {
  const rec = document.getElementById('aiRec');
  const types = jsonlds.map(getType);
  const recs = [];

  // Type-specific tips
  types.forEach(type => {
    const rules = SCHEMA_RULES[type];
    if (rules && rules.tips) {
      const tip = rules.tips[Math.floor(Math.random() * rules.tips.length)];
      recs.push(tip);
    }
  });

  // Score-based recommendations
  if (scores.overall < 50) {
    recs.unshift('<strong>우선 필수 속성부터 채우세요.</strong> 필수 속성이 없으면 Google이 리치 결과를 전혀 표시하지 않습니다.');
  }
  if (scores.recommendedScore < 60) {
    recs.push('<strong>권장 속성을 추가하면 CTR이 평균 20~30% 향상됩니다.</strong> 이미지, 설명, 평점 등을 우선 추가하세요.');
  }
  if (jsonlds.length === 1 && !types.includes('BreadcrumbList')) {
    recs.push('<strong>BreadcrumbList를 추가하세요.</strong> 거의 모든 페이지에 적용 가능하며, 검색 결과 내 사이트 계층 표시를 개선합니다.');
  }
  if (!types.includes('WebSite') && !types.includes('Organization')) {
    recs.push('<strong>홈페이지에 WebSite + Organization 마크업을 추가하세요.</strong> 사이트 전체의 지식 그래프 인식에 기여합니다.');
  }

  // Missing types suggestions
  const errors = issues.filter(i => i.severity === 'error');
  errors.forEach(e => {
    if (e.title.includes('offers') && types.includes('Product')) {
      recs.push('`offers` 내부에 `price`, `priceCurrency`, `availability`는 반드시 포함하세요 — 이 3개가 없으면 상품 리치 결과가 표시되지 않습니다.');
    }
  });

  // Always add general tip
  recs.push('<strong>Google Rich Results Test로 최종 검증하세요:</strong> <code>https://search.google.com/test/rich-results</code>에서 실제 렌더링 결과를 확인할 수 있습니다.');

  // Deduplicate and limit
  const unique = [...new Set(recs)].slice(0, 6);

  rec.innerHTML = `
    <div class="ai-rec-header">
      <span>🤖 AI 추천</span>
    </div>
    ${unique.map(r => `<div class="ai-rec-item">${r}</div>`).join('')}
  `;
}

function renderDetailCards(issues) {
  const container = document.getElementById('detailCards');
  const categories = {};
  issues.filter(i => i.severity !== 'pass').forEach(issue => {
    (categories[issue.category] = categories[issue.category] || []).push(issue);
  });

  const passIssues = issues.filter(i => i.severity === 'pass');

  let html = '';
  for (const [cat, items] of Object.entries(categories)) {
    const errorCount = items.filter(i => i.severity === 'error').length;
    const warnCount = items.filter(i => i.severity === 'warn').length;
    const badge = errorCount > 0 ? `<span style="color:var(--accent-red);font-size:.7rem;margin-left:.5rem">${errorCount} 오류</span>` : '';
    const wBadge = warnCount > 0 ? `<span style="color:var(--accent-amber);font-size:.7rem;margin-left:.25rem">${warnCount} 경고</span>` : '';

    html += `<div class="card">
      <div class="card-header" onclick="toggleCard(this)">
        <h3>${cat === '필수 속성' ? '🔴' : cat === '권장 속성' ? '🟡' : '🔵'} ${cat}${badge}${wBadge}</h3>
        <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>
      </div>
      <div class="card-body">
        ${items.map(i => `
          <div class="issue">
            <div class="issue-icon ${i.severity}">
              ${i.severity === 'error' ? '✕' : i.severity === 'warn' ? '!' : 'i'}
            </div>
            <div class="issue-content">
              <h4>${i.title}</h4>
              ${i.desc ? `<p>${i.desc}</p>` : ''}
            </div>
          </div>
        `).join('')}
      </div>
    </div>`;
  }

  if (passIssues.length > 0) {
    html += `<div class="card">
      <div class="card-header" onclick="toggleCard(this)">
        <h3>✅ 통과 항목 <span style="font-size:.7rem;color:var(--accent-green);margin-left:.5rem">${passIssues.length}개</span></h3>
        <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>
      </div>
      <div class="card-body">
        ${passIssues.map(i => `
          <div class="issue"><div class="issue-icon pass">✓</div><div class="issue-content"><h4>${i.title}</h4></div></div>
        `).join('')}
      </div>
    </div>`;
  }

  container.innerHTML = html;
}

function syntaxHighlight(json) {
  return json.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"(\\u[\da-fA-F]{4}|\\[^u]|[^\\"])*"(\s*:)?/g, m => {
      if (/:$/.test(m)) return `<span class="jt-key">${m}</span>`;
      return `<span class="jt-string">${m}</span>`;
    })
    .replace(/\b(true|false)\b/g, '<span class="jt-bool">$&</span>')
    .replace(/\bnull\b/g, '<span class="jt-null">$&</span>')
    .replace(/\b\d+\.?\d*\b/g, '<span class="jt-number">$&</span>')
    .replace(/[{}\[\]]/g, '<span class="jt-bracket">$&</span>');
}

function animateNumber(el, target) {
  let current = 0;
  const step = Math.ceil(target / 40);
  const interval = setInterval(() => {
    current = Math.min(current + step, target);
    el.textContent = current;
    if (current >= target) clearInterval(interval);
  }, 30);
}

// Enter key support
document.getElementById('urlInput').addEventListener('keydown', e => { if (e.key === 'Enter') analyzeUrl(); });
